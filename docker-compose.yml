# Minister dev compose.
#
# - postgres     : application database
# - minister      : Next.js app (port 3000)
# - minister-seed : one-shot, runs the OIDC seed script with the
#                  deterministic demo-client credentials. Idempotent.
#
# The demo-client (apps/demo-client) is run on the host with
# `pnpm --filter @minister/demo-client dev` so the OIDC issuer URL it
# sees matches the URL the discovery doc advertises (both
# http://localhost:3000). The credentials it uses match what
# minister-seed inserts.
#
# Magic-link emails are printed to the minister container's stdout in
# dev (no mailhog). notary, ws-proxy, and tlsn-verifier are enabled for
# the Stage 6 TLSNotary flow.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: minister
      POSTGRES_PASSWORD: minister
      POSTGRES_DB: minister
    ports:
      # Host port 5433 — 5432 tends to be taken by another local
      # postgres. Container-internal stays 5432; for host-side dev use
      # postgresql://minister:minister@localhost:5433/minister
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minister -d minister"]
      interval: 5s
      timeout: 5s
      retries: 10

  minister:
    build:
      context: .
      dockerfile: apps/minister/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://minister:minister@postgres:5432/minister?schema=public
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      # Generate with: openssl rand -base64 32
      AUTH_SECRET: ${AUTH_SECRET:-dev-only-replace-me-with-openssl-rand-base64-32}
      MINISTER_ISSUER_DOMAIN: ${MINISTER_ISSUER_DOMAIN:-minister.local}
      OIDC_PAIRWISE_SECRET: ${OIDC_PAIRWISE_SECRET:-dev-only-replace-me-with-openssl-rand-base64-32}
      TLSN_VERIFIER_URL: http://tlsn-verifier:7048
    ports:
      - "3000:3000"

  # Idempotent: upserts the demo client by clientId. Runs to completion
  # and exits. `restart: "no"` so it doesn't keep re-running.
  minister-seed:
    build:
      context: .
      dockerfile: apps/minister/Dockerfile
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://minister:minister@postgres:5432/minister?schema=public
    # Run db push first so we don't race the minister service for
    # schema creation. Both calls are idempotent; if the minister
    # service already pushed, this is a no-op.
    command:
      - sh
      - -c
      - >
        pnpm prisma db push --skip-generate &&
        pnpm oidc:seed-client
        --name "Demo client"
        --redirect-uri http://localhost:3100/api/auth/callback/minister
        --scope openid
        --scope profile
        --scope badge:email-domain
        --client-id ${DEMO_CLIENT_ID:-demo_client}
        --client-secret ${DEMO_CLIENT_SECRET:-dev-only-demo-client-secret-replace-me}

  # ---------------------------------------------------------------------------
  # TLSNotary stack — Stage 6: notary-server (upstream image, pinned),
  # tlsn-verifier (Presentation::verify sidecar), ws-proxy (WS->TCP relay
  # for the extension prover).
  # ---------------------------------------------------------------------------
  notary-server:
    build:
      context: ./services/notary
    restart: unless-stopped
    ports:
      - "7047:7047"
    volumes:
      - notary_data:/data

  tlsn-verifier:
    build:
      context: ./services/tlsn-verifier
    restart: unless-stopped
    environment:
      VERIFIER_MODE: ${VERIFIER_MODE:-passthrough}
      RUST_LOG: ${RUST_LOG:-info}
      # REQUIRED in real mode: the notary's verifying key (hex) so only OUR
      # notary's signatures are trusted. VERIFIER_MODE=real refuses to boot
      # without it (read it from GET http://notary-server:7047/info).
      TLSN_NOTARY_PUBLIC_KEY: ${TLSN_NOTARY_PUBLIC_KEY:-}
    ports:
      - "7048:7048"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:7048/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # WebSocket -> TCP relay the browser extension tunnels its TLSNotary
  # session through. Exact-match host allowlist keeps it from being an
  # open proxy; see services/ws-proxy/README.md.
  ws-proxy:
    build:
      context: ./services/ws-proxy
    restart: unless-stopped
    environment:
      WS_PROXY_LISTEN: ":55688"
      WS_PROXY_ALLOWED_HOSTS: ${WS_PROXY_ALLOWED_HOSTS:-id.me,github.com,example.com}
      WS_PROXY_ALLOWED_PORTS: ${WS_PROXY_ALLOWED_PORTS:-443}
    ports:
      - "55688:55688"
    healthcheck:
      test: ["CMD", "/ws-proxy", "-health-check"]
      interval: 10s
      timeout: 5s
      retries: 5
      # distroless has no shell; the binary self-checks via -health-check.
      start_period: 5s

volumes:
  postgres_data:
  notary_data:
