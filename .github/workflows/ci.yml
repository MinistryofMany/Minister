name: CI

on:
  push:
    branches: [main]
  pull_request:

# The @minister/{vc,shared,plugin-sdk} libraries are in-repo workspace packages
# under packages/*, wired in as workspace:* deps — so a single checkout plus
# `pnpm install` resolves everything. (They used to be sibling repos linked via
# link:, which required checking each one out separately; that is no longer the case.)
jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      HUSKY: "0" # git hooks are irrelevant in CI
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test
