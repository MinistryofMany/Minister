name: build-tlsn-images
# Build OUR two TLSNotary sidecar images in the cloud and push to GHCR, so the
# Lightsail box (2 GB, can't build Rust/Go) just pulls. The notary itself is the
# upstream pinned image (services/notary/Dockerfile is FROM-only) and is NOT
# built here. Mirrors build-image.yml (the Minister app image).
on:
  push:
    branches: [main]
    paths:
      - "services/ws-proxy/**"
      - "services/tlsn-verifier/**"
      - ".github/workflows/build-tlsn-images.yml"
  workflow_dispatch:
permissions:
  contents: read
  packages: write
concurrency:
  group: build-tlsn-images-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: ws-proxy
            context: services/ws-proxy
          - name: tlsn-verifier
            context: services/tlsn-verifier
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ghcr.io/ministryofmany/ministry-${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
