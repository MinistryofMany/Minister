<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Minister</title>
    <style>
      body {
        font-family:
          ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        margin: 0;
        padding: 16px;
        width: 320px;
        background: #fafafa;
        color: #111;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 8px;
      }
      p {
        font-size: 13px;
        margin: 8px 0;
        color: #444;
      }
      code {
        font-size: 12px;
        background: #eee;
        padding: 1px 4px;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <h1>Minister</h1>
    <p>
      This is the Minister browser extension. It will perform TLSNotary
      proofs in the browser and submit them back to Minister.
    </p>
    <p>
      Open a Minister badge wizard that needs a proof, then run it from
      here. The proof runs in an offscreen document via
      <code>tlsn-js</code> and is submitted to
      <code>/api/tlsn/submit</code>.
    </p>
    <script type="module" src="popup.js"></script>
  </body>
</html>
